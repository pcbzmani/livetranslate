<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#2563eb"/>

  <!-- Left speech bubble -->
  <rect x="8" y="10" width="52" height="34" rx="9" fill="white" opacity="0.95"/>
  <polygon points="16,44 30,44 20,56" fill="white" opacity="0.95"/>

  <!-- Text lines in left bubble -->
  <rect x="16" y="22" width="32" height="4" rx="2" fill="#2563eb" opacity="0.5"/>
  <rect x="16" y="32" width="22" height="4" rx="2" fill="#2563eb" opacity="0.35"/>

  <!-- Right speech bubble -->
  <rect x="40" y="52" width="52" height="30" rx="9" fill="white" opacity="0.75"/>
  <polygon points="84,82 70,82 80,94" fill="white" opacity="0.75"/>

  <!-- Text lines in right bubble -->
  <rect x="48" y="62" width="32" height="4" rx="2" fill="#059669" opacity="0.5"/>
  <rect x="48" y="72" width="22" height="4" rx="2" fill="#059669" opacity="0.35"/>

  <!-- Translate arrows -->
  <text x="68" y="48" font-size="14" text-anchor="middle" fill="white" opacity="0.9" font-family="Arial">⇄</text>
</svg>

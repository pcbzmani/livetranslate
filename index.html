<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6366f1" />
  <title>LiveTranslate</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <span class="header-icon">🌐</span>
    <h1>LiveTranslate</h1>
  </header>

  <!-- ── Language Pair Bar ───────────────────────────────── -->
  <div class="lang-bar">
    <div class="lang-slot">
      <label class="lang-label">From</label>
      <select id="langFrom" class="lang-select"></select>
    </div>

    <button id="swapBtn" class="swap-btn" title="Swap languages">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
        <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
      </svg>
    </button>

    <div class="lang-slot lang-slot-right">
      <label class="lang-label">To</label>
      <select id="langTo" class="lang-select"></select>
    </div>
  </div>

  <!-- ── Mic Section ─────────────────────────────────────── -->
  <div class="mic-section">
    <button id="micBtn" class="mic-btn" aria-label="Tap to speak">
      <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="white">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0019 11h-2z"/>
      </svg>
    </button>
    <div id="statusText" class="status-text">Tap mic to speak</div>
    <div id="interimText" class="interim-text"></div>
  </div>

  <!-- ── Result Card (shown after translation) ───────────── -->
  <div id="resultCard" class="result-card hidden">
    <div class="result-original" id="resultOriginal"></div>
    <div class="result-divider">
      <span class="result-lang-badge" id="resultLangBadge"></span>
    </div>
    <div class="result-translated" id="resultTranslated"></div>
    <button class="replay-btn" id="replayBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      Play again
    </button>
  </div>

  <!-- ── History ──────────────────────────────────────────── -->
  <div class="history-section">
    <div class="history-header">
      <span class="history-title">History</span>
      <button id="clearBtn" class="clear-btn">✕ Clear</button>
    </div>
    <div id="historyList" class="history-list">
      <div class="empty-history">No translations yet</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script src="app.js?v=4"></script>
</body>
</html>
